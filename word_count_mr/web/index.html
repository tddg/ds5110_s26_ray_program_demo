<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ray Word Count MapReduce</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #1b2024;
      --panel-2: #14181b;
      --line: #354148;
      --text: #f4f7f6;
      --muted: #a9b4b0;
      --map: #47b8e8;
      --reduce: #8fd14f;
      --accent: #f0b84b;
      --danger: #ef6a76;
      --r0: #47b8e8;
      --r1: #8fd14f;
      --r2: #f0b84b;
      --r3: #ef6a76;
      --r4: #b48cff;
      --r5: #49d6bd;
      --r6: #f58ac8;
      --r7: #9aa6ff;
      --r8: #d0c75c;
      --r9: #6cc1ff;
      --r10: #ff9f59;
      --r11: #a6df78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      min-height: 62px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #171b1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    button, input, textarea, select, .button-link {
      border: 1px solid var(--line);
      background: #242b30;
      color: var(--text);
      border-radius: 6px;
      font-size: 14px;
    }
    button, .button-link {
      min-height: 36px;
      padding: 8px 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    button:hover, .button-link:hover { border-color: var(--accent); }
    button:active { transform: translateY(1px); }
    button.primary {
      border-color: #5f7a34;
      background: #26371f;
    }
    button:disabled { opacity: 0.55; cursor: wait; }
    main {
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(360px, 420px) minmax(0, 1fr);
      gap: 16px;
      min-height: 0;
    }
    aside, .workspace {
      min-height: 0;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    section, .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      padding: 10px;
      line-height: 1.45;
      background: #111518;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; }
    input[type="number"] { width: 100%; padding: 8px; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .metric {
      border: 1px solid #2a3338;
      border-radius: 6px;
      background: var(--panel-2);
      padding: 9px;
      min-width: 0;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-size: 22px; font-weight: 760; line-height: 1.1; overflow-wrap: anywhere; }
    .flow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
    }
    .task h3 {
      margin: 0 0 8px;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .tag {
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 750;
      color: #0f1415;
      background: var(--map);
      white-space: nowrap;
    }
    .tag.reduce { background: var(--reduce); }
    .reducer-r0 { --reducer-color: var(--r0); }
    .reducer-r1 { --reducer-color: var(--r1); }
    .reducer-r2 { --reducer-color: var(--r2); }
    .reducer-r3 { --reducer-color: var(--r3); }
    .reducer-r4 { --reducer-color: var(--r4); }
    .reducer-r5 { --reducer-color: var(--r5); }
    .reducer-r6 { --reducer-color: var(--r6); }
    .reducer-r7 { --reducer-color: var(--r7); }
    .reducer-r8 { --reducer-color: var(--r8); }
    .reducer-r9 { --reducer-color: var(--r9); }
    .reducer-r10 { --reducer-color: var(--r10); }
    .reducer-r11 { --reducer-color: var(--r11); }
    .tag.reducer-tag {
      background: var(--reducer-color, var(--reduce));
    }
    .worker-meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: -2px 0 8px;
    }
    .worker-meta span {
      border: 1px solid #2a3338;
      background: #111518;
      border-radius: 999px;
      padding: 3px 7px;
    }
    .input {
      color: var(--muted);
      font-size: 13px;
      border: 1px solid #2a3338;
      background: #111518;
      border-radius: 6px;
      padding: 8px;
      min-height: 42px;
      overflow-wrap: anywhere;
    }
    .input-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .input-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .input-toggle {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .input-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .input.expanded .input-text {
      display: block;
      max-height: 180px;
      overflow: auto;
    }
    .output-block {
      margin-top: 8px;
      border: 1px solid #2a3338;
      background: #111518;
      border-radius: 6px;
      padding: 8px;
    }
    .output-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .output-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .output-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      margin-left: 4px;
      text-transform: none;
    }
    .output-toggle {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #40505a;
      border-left: 4px solid var(--map);
      background: #151b1f;
      border-radius: 6px;
      padding: 5px 7px;
      font-size: 13px;
      max-width: 100%;
    }
    .chip.reduce, .chip.reducer-chip { border-left-color: var(--reducer-color, var(--reduce)); }
    .chip strong { overflow-wrap: anywhere; }
    .output-preview.chips, .output-full.chips {
      margin-top: 0;
    }
    .output-full.chips, .output-full.table {
      display: none;
    }
    .output-preview.table, .output-full.table {
      max-height: none;
      overflow: visible;
    }
    .output-block.expanded .output-preview {
      display: none;
    }
    .output-block.expanded .output-full.chips {
      display: flex;
    }
    .output-block.expanded .output-full.table {
      display: block;
    }
    .more-note {
      color: var(--muted);
      font-size: 12px;
      align-self: center;
      padding: 5px 0;
    }
    .bucket {
      margin-top: 8px;
      border-top: 1px solid #2b3338;
      padding-top: 8px;
    }
    .bucket-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .partition-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .partition-card {
      border: 1px solid #2a3338;
      border-top: 4px solid var(--reducer-color, var(--reduce));
      border-radius: 8px;
      background: #111518;
      padding: 10px;
      min-width: 0;
    }
    .partition-card h3 {
      margin: 0 0 4px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .partition-rule {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }
    .partition-words {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .partition-full {
      display: none;
      margin-top: 0;
    }
    .partition-card.expanded .partition-preview {
      display: none;
    }
    .partition-card.expanded .partition-full {
      display: flex;
    }
    .partition-word {
      border: 1px solid color-mix(in srgb, var(--reducer-color, var(--reduce)) 60%, #40505a);
      border-radius: 6px;
      background: #151b1f;
      padding: 5px 7px;
      font-size: 13px;
      max-width: 100%;
    }
    .partition-word strong { overflow-wrap: anywhere; }
    .partition-toggle {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .table {
      max-height: 260px;
      overflow: auto;
      font-variant-numeric: tabular-nums;
    }
    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 7px 0;
      border-top: 1px solid #2b3338;
      font-size: 14px;
    }
    .row:first-child { border-top: 0; }
    .word { overflow-wrap: anywhere; }
    .count { color: var(--accent); font-weight: 760; }
    .nodes {
      display: grid;
      gap: 7px;
    }
    .node {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .status { color: var(--muted); font-size: 13px; }
    .error { color: var(--danger); }
    @media (max-width: 1100px) {
      main, .flow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ray Word Count MapReduce</h1>
    <div class="actions">
      <a id="dashboardTop" class="button-link" href="#" target="_blank" rel="noreferrer">Ray Dashboard</a>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>
  <main>
    <aside>
      <section>
        <h2>Input</h2>
        <textarea id="inputText" spellcheck="false"></textarea>
        <div class="controls">
          <label>Map tasks
            <input id="mapTasks" type="number" min="1" max="12" value="4">
          </label>
          <label>Reduce tasks
            <input id="reduceTasks" type="number" min="1" max="12" value="3">
          </label>
        </div>
        <div class="actions">
          <button id="runBtn" class="primary">Run MapReduce</button>
          <button id="sampleBtn">Sample Text</button>
        </div>
        <div id="status" class="status"></div>
      </section>
      <section>
        <h2>Run Metrics</h2>
        <div class="metrics">
          <div class="metric"><div class="label">Maps</div><div id="mapsMetric" class="value">0</div></div>
          <div class="metric"><div class="label">Reduces</div><div id="reducesMetric" class="value">0</div></div>
          <div class="metric"><div class="label">Runtime</div><div id="runtimeMetric" class="value">0 ms</div></div>
        </div>
      </section>
      <section>
        <h2>Top 20 Words</h2>
        <div id="topWords" class="table"></div>
      </section>
      <section>
        <h2>Ray Nodes</h2>
        <div id="nodes" class="nodes"></div>
      </section>
    </aside>
    <div class="workspace">
      <section>
        <h2>Map Phase</h2>
        <div id="mapGrid" class="task-grid"></div>
      </section>
      <section>
        <h2>Shuffle / Partition</h2>
        <div id="partitionGrid" class="partition-grid"></div>
      </section>
      <section>
        <h2>Shuffle To Reduce Buckets</h2>
        <div class="flow">
          <div>
            <h2>Map Buckets</h2>
            <div id="bucketGrid" class="task-grid"></div>
          </div>
          <div>
            <h2>Reduce Phase</h2>
            <div id="reduceGrid" class="task-grid"></div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script>
    const inputText = document.getElementById('inputText');
    const mapTasks = document.getElementById('mapTasks');
    const reduceTasks = document.getElementById('reduceTasks');
    const runBtn = document.getElementById('runBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const dashboardTop = document.getElementById('dashboardTop');
    const statusEl = document.getElementById('status');
    const mapsMetric = document.getElementById('mapsMetric');
    const reducesMetric = document.getElementById('reducesMetric');
    const runtimeMetric = document.getElementById('runtimeMetric');
    const topWords = document.getElementById('topWords');
    const nodesEl = document.getElementById('nodes');
    const mapGrid = document.getElementById('mapGrid');
    const partitionGrid = document.getElementById('partitionGrid');
    const bucketGrid = document.getElementById('bucketGrid');
    const reduceGrid = document.getElementById('reduceGrid');
    let defaultText = '';

    function esc(value) {
      return String(value).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function reducerClass(reduceId) {
      const id = Number(reduceId);
      return Number.isFinite(id) ? `reducer-r${id % 12}` : '';
    }

    function pairChip(word, count, reduceId) {
      const target = reduceId === undefined ? '' : `<span>R${reduceId}</span>`;
      return `<span class="chip reducer-chip ${reducerClass(reduceId)}"><strong>${esc(word)}</strong><span>${count}</span>${target}</span>`;
    }

    function reduceChip(word, count, reduceId) {
      return `<span class="chip reduce ${reducerClass(reduceId)}"><strong>${esc(word)}</strong><span>${count}</span></span>`;
    }

    function workerMeta(task) {
      if (!task || (!task.node_ip && !task.hostname)) return '';
      const host = task.hostname && task.hostname !== task.node_ip ? `<span>${esc(task.hostname)}</span>` : '';
      return `<div class="worker-meta"><span>IP ${esc(task.node_ip || 'unknown')}</span>${host}</div>`;
    }

    function inputPreview(text, limit = 88) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if (!clean) return '(empty input bucket)';
      return clean.length > limit ? `${clean.slice(0, limit)}...` : clean;
    }

    function mapInputBlock(task) {
      const full = task.input || '(empty input bucket)';
      const preview = inputPreview(task.input);
      const canExpand = full !== preview;
      return `
        <div class="input" data-full="${esc(full)}" data-preview="${esc(preview)}">
          <div class="input-head">
            <span class="input-label">Input shard</span>
            ${canExpand ? '<button class="input-toggle" type="button">Expand</button>' : ''}
          </div>
          <div class="input-text">${esc(preview)}</div>
        </div>
      `;
    }

    function chipsHtml(items, renderer) {
      if (!items || items.length === 0) return '<span class="status">empty</span>';
      return items.map(renderer).join('');
    }

    function collapsibleOutput(label, items, renderer, previewLimit = 6) {
      const list = items || [];
      const previewItems = list.slice(0, previewLimit);
      const canExpand = list.length > previewLimit;
      const more = canExpand ? `<span class="more-note">+${list.length - previewLimit} more</span>` : '';
      return `
        <div class="output-block">
          <div class="output-head">
            <span class="output-label">${esc(label)}<span class="output-count">${list.length} item${list.length === 1 ? '' : 's'}</span></span>
            ${canExpand ? '<button class="output-toggle" type="button">Expand</button>' : ''}
          </div>
          <div class="output-preview chips">${chipsHtml(previewItems, renderer)}${more}</div>
          <div class="output-full chips">${chipsHtml(list, renderer)}</div>
        </div>
      `;
    }

    function collapsibleTable(label, entries, previewLimit = 8) {
      const list = entries || [];
      const preview = list.slice(0, previewLimit);
      const canExpand = list.length > previewLimit;
      const rows = rowsList => rowsList.map(([word, count]) => `
        <div class="row"><span class="word">${esc(word)}</span><span class="count">${count}</span></div>
      `).join('') || '<div class="status">No output.</div>';
      const more = canExpand ? `<div class="row"><span class="word more-note">+${list.length - previewLimit} more</span><span></span></div>` : '';
      return `
        <div class="output-block">
          <div class="output-head">
            <span class="output-label">${esc(label)}<span class="output-count">${list.length} word${list.length === 1 ? '' : 's'}</span></span>
            ${canExpand ? '<button class="output-toggle" type="button">Expand</button>' : ''}
          </div>
          <div class="output-preview table">${rows(preview)}${more}</div>
          <div class="output-full table">${rows(list)}</div>
        </div>
      `;
    }

    function renderPartitionPanel(run) {
      const reducers = new Map();
      for (const task of run.map_tasks || []) {
        for (const item of task.assignments || []) {
          if (!reducers.has(item.reduce_id)) reducers.set(item.reduce_id, new Map());
          const words = reducers.get(item.reduce_id);
          const current = words.get(item.word) || { word: item.word, count: 0, maps: new Set() };
          current.count += item.count;
          current.maps.add(task.id);
          words.set(item.word, current);
        }
      }

      const reduceCount = run.num_reduce_tasks || reducers.size || 0;
      if (!reduceCount) {
        partitionGrid.innerHTML = '<div class="status">No partition data yet.</div>';
        return;
      }

      const cards = [];
      for (let reduceId = 0; reduceId < reduceCount; reduceId++) {
        const words = [...(reducers.get(reduceId) || new Map()).values()]
          .sort((a, b) => b.count - a.count || a.word.localeCompare(b.word));
        const previewLimit = 6;
        const preview = words.slice(0, previewLimit);
        const canExpand = words.length > previewLimit;
        const wordItems = items => items.map(item => `
          <span class="partition-word">
            <strong>${esc(item.word)}</strong>
            <span>${item.count}</span>
          </span>
        `).join('') || '<span class="status">No words routed here.</span>';
        const more = canExpand ? `<span class="more-note">+${words.length - previewLimit} more</span>` : '';
        cards.push(`
          <article class="partition-card ${reducerClass(reduceId)}">
            <h3>
              <span>Reduce ${reduceId}</span>
              <span class="tag reducer-tag ${reducerClass(reduceId)}">R${reduceId}</span>
            </h3>
            <div class="partition-rule">md5(word) % ${reduceCount} == ${reduceId}</div>
            <div class="output-head">
              <span class="output-label">Owned words<span class="output-count">${words.length} word${words.length === 1 ? '' : 's'}</span></span>
              ${canExpand ? '<button class="partition-toggle" type="button">Expand</button>' : ''}
            </div>
            <div class="partition-words partition-preview">${wordItems(preview)}${more}</div>
            <div class="partition-words partition-full">${wordItems(words)}</div>
          </article>
        `);
      }
      partitionGrid.innerHTML = cards.join('');
    }

    function renderRows(items) {
      if (!items || items.length === 0) return '<div class="status">No words yet.</div>';
      return items.map(item => `
        <div class="row"><span class="word">${esc(item.word)}</span><span class="count">${item.count}</span></div>
      `).join('');
    }

    function renderNodes(nodes) {
      if (!nodes || nodes.length === 0) {
        nodesEl.innerHTML = '<div class="status">No Ray nodes reported.</div>';
        return;
      }
      nodesEl.innerHTML = nodes.map(node => `
        <div class="node">
          <span>${esc(node.ip)}</span>
          <span>${node.alive ? 'alive' : 'down'} · CPU ${esc(node.cpu)}</span>
        </div>
      `).join('');
    }

    function renderRun(run) {
      if (!run) {
        mapsMetric.textContent = '0';
        reducesMetric.textContent = '0';
        runtimeMetric.textContent = '0 ms';
        topWords.innerHTML = '<div class="status">Run the pipeline to see counts.</div>';
        mapGrid.innerHTML = '';
        partitionGrid.innerHTML = '';
        bucketGrid.innerHTML = '';
        reduceGrid.innerHTML = '';
        return;
      }
      mapsMetric.textContent = run.num_map_tasks || 0;
      reducesMetric.textContent = run.num_reduce_tasks || 0;
      runtimeMetric.textContent = run.duration_ms ? `${run.duration_ms} ms` : 'running';
      topWords.innerHTML = renderRows(run.top_words || []);

      mapGrid.innerHTML = (run.map_tasks || []).map(task => `
        <article class="task">
          <h3><span>Map ${task.id}</span><span class="tag">task</span></h3>
          ${workerMeta(task)}
          ${mapInputBlock(task)}
          ${collapsibleOutput('Map output', task.assignments || [], item => pairChip(item.word, item.count, item.reduce_id))}
        </article>
      `).join('');

      renderPartitionPanel(run);

      bucketGrid.innerHTML = (run.map_tasks || []).map(task => `
        <article class="task">
          <h3><span>Map ${task.id}</span><span class="tag">buckets</span></h3>
          ${(task.buckets || []).map(bucket => `
            <div class="bucket">
              <div class="bucket-title">To reduce ${bucket.reduce_id}</div>
              ${collapsibleOutput('Bucket output', bucket.pairs || [], pair => pairChip(pair[0], pair[1], bucket.reduce_id))}
            </div>
          `).join('')}
        </article>
      `).join('');

      reduceGrid.innerHTML = (run.reduce_tasks || []).map(task => `
        <article class="task">
          <h3><span>Reduce ${task.id}</span><span class="tag reducer-tag ${reducerClass(task.id)}">task</span></h3>
          ${workerMeta(task)}
          ${(task.inputs || []).map(input => `
            <div class="bucket">
              <div class="bucket-title">From map ${input.map_id}</div>
              ${collapsibleOutput('Reduce input', input.pairs || [], pair => reduceChip(pair[0], pair[1], task.id))}
            </div>
          `).join('')}
          <div class="bucket">
            <div class="bucket-title">Reduced output</div>
            ${collapsibleTable('Reduce output', Object.entries(task.output || {}))}
          </div>
        </article>
      `).join('');
    }

    async function loadState() {
      const response = await fetch('/state');
      const state = await response.json();
      defaultText = state.default_text || defaultText;
      if (!inputText.value) inputText.value = defaultText;
      if (state.dashboard_url) {
        dashboardTop.href = state.dashboard_url;
        dashboardTop.style.display = 'inline-flex';
      } else {
        dashboardTop.style.display = 'none';
      }
      runBtn.disabled = state.running;
      statusEl.textContent = state.running ? 'Ray tasks are running.' : 'Ready.';
      if (state.error) statusEl.innerHTML = `<span class="error">${esc(state.error)}</span>`;
      renderNodes((state.last_run && state.last_run.nodes) || state.nodes);
      renderRun(state.last_run);
      return state;
    }

    async function runPipeline() {
      runBtn.disabled = true;
      statusEl.textContent = 'Submitting Ray map tasks.';
      await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: inputText.value,
          maps: Number(mapTasks.value),
          reduces: Number(reduceTasks.value)
        })
      });
      await loadUntilDone();
    }

    async function loadUntilDone() {
      const state = await loadState();
      if (state.running) setTimeout(loadUntilDone, 400);
    }

    runBtn.addEventListener('click', runPipeline);
    refreshBtn.addEventListener('click', loadState);
    sampleBtn.addEventListener('click', () => {
      inputText.value = defaultText;
    });
    mapGrid.addEventListener('click', event => {
      const button = event.target.closest('.input-toggle');
      if (!button) return;
      const box = button.closest('.input');
      const text = box.querySelector('.input-text');
      const expanded = box.classList.toggle('expanded');
      text.textContent = expanded ? box.dataset.full : box.dataset.preview;
      button.textContent = expanded ? 'Collapse' : 'Expand';
    });
    document.querySelector('.workspace').addEventListener('click', event => {
      const outputButton = event.target.closest('.output-toggle');
      if (outputButton) {
        const box = outputButton.closest('.output-block');
        const expanded = box.classList.toggle('expanded');
        outputButton.textContent = expanded ? 'Collapse' : 'Expand';
        return;
      }
      const partitionButton = event.target.closest('.partition-toggle');
      if (!partitionButton) return;
      const card = partitionButton.closest('.partition-card');
      const expanded = card.classList.toggle('expanded');
      partitionButton.textContent = expanded ? 'Collapse' : 'Expand';
    });
    loadState();
    setInterval(loadState, 5000);
  </script>
</body>
</html>
